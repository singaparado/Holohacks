<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Holohacks — Fix It</title>

<!-- PWA / installability -->
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#2B2A28" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Holohacks" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<link rel="icon" href="/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --graphite:#2B2A28;
    --paper:#EDEAE3;
    --card:#F7F5F0;
    --amber:#E8A93A;
    --muted:#6b6862;
    --muted2:#5c5952;
    --line:#DDD8CC;
    --error:#a3402f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--graphite);
    font-family:'IBM Plex Mono', monospace;
    min-height:100vh;
  }
  .wrap{max-width:640px;margin:0 auto;padding:32px 20px 80px;}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
  .brand{display:flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.15em;text-transform:uppercase;}
  .brand .dot{color:var(--amber);}
  .counter{font-size:11px;color:var(--muted);}
  h1{font-family:Georgia,serif;font-size:30px;line-height:1.15;margin:0 0 8px;}
  p.sub{font-size:13px;color:var(--muted2);margin:0 0 24px;line-height:1.5;}
  textarea{
    width:100%;padding:14px;margin-bottom:12px;font-size:13px;font-family:'IBM Plex Mono',monospace;
    border:1px solid var(--graphite);background:var(--card);resize:none;min-height:110px;
  }
  .row{display:flex;gap:10px;margin-bottom:16px;}
  button{
    font-family:'IBM Plex Mono',monospace;font-size:13px;cursor:pointer;border:1px solid var(--graphite);
    background:transparent;padding:10px 16px;
  }
  button.primary{flex:1;background:var(--graphite);color:var(--paper);border:none;display:flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;letter-spacing:.05em;}
  button.primary:disabled{opacity:.6;cursor:default;}
  .imgpreview{position:relative;border:1px solid var(--graphite);margin-bottom:14px;}
  .imgpreview img{width:100%;max-height:260px;object-fit:cover;display:block;}
  .imgpreview .remove{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.9);border:none;padding:4px 8px;}
  .error{color:var(--error);font-size:12px;margin-top:4px;}

  .step{position:relative;padding:16px;border:1px solid var(--graphite);background:var(--card);margin-bottom:16px;}
  .tag{position:absolute;top:-11px;left:14px;background:var(--amber);color:var(--graphite);font-size:10px;text-transform:uppercase;letter-spacing:.15em;padding:2px 8px;}
  .step p{font-size:13px;line-height:1.6;margin:8px 0 0;white-space:pre-wrap;}
  .replybubble{margin-left:32px;padding:10px 14px;background:var(--line);font-size:13px;margin-bottom:16px;}
  .thinking{font-size:11px;color:var(--muted);margin-bottom:12px;}

  .replyrow{display:flex;gap:8px;margin-bottom:10px;}
  .replyrow input{flex:1;padding:12px;font-size:13px;border:1px solid var(--graphite);background:var(--card);font-family:'IBM Plex Mono',monospace;}
  .linklike{font-size:11px;color:var(--muted2);text-decoration:underline;background:none;border:none;padding:0;cursor:pointer;}

  .paywall{text-align:center;padding:60px 0;}
  .lock{font-size:32px;margin-bottom:12px;}
  .paywall h2{font-family:Georgia,serif;font-size:24px;margin:0 0 8px;}
  .paywall p{font-size:13px;color:var(--muted2);margin:0 0 24px;}
  .unlockbtn{background:var(--graphite);color:var(--paper);padding:14px 28px;text-transform:uppercase;letter-spacing:.05em;border:none;font-size:13px;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const FREE_FIX_LIMIT = 3;

let state = {
  screen: "start", // start | session | paywall
  problemText: "",
  imageBase64: null,
  imagePreview: null,
  messages: [],
  displaySteps: [],
  replyText: "",
  loading: false,
  fixesStarted: 0,
  error: null,
};

function setState(patch) {
  state = { ...state, ...patch };
  render();
}

async function callBackend(messages) {
  const res = await fetch("/api/fix", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ messages }),
  });
  if (!res.ok) throw new Error("Request failed");
  const data = await res.json();
  return data.text;
}

function handleImagePick(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const result = reader.result;
    setState({ imageBase64: result.split(",")[1], imagePreview: result });
  };
  reader.onerror = () => setState({ error: "Could not read that image. Try again." });
  reader.readAsDataURL(file);
}

async function startFix() {
  if (!state.problemText.trim() && !state.imageBase64) {
    setState({ error: "Describe the problem or attach a photo first." });
    return;
  }
  if (state.fixesStarted >= FREE_FIX_LIMIT) {
    setState({ screen: "paywall" });
    return;
  }
  setState({ error: null, loading: true });

  const content = [];
  if (state.imageBase64) {
    content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: state.imageBase64 } });
  }
  content.push({ type: "text", text: state.problemText.trim() || "See attached photo. Help me figure out what's wrong and how to fix it." });

  const newMessages = [{ role: "user", content }];

  try {
    const reply = await callBackend(newMessages);
    setState({
      messages: [...newMessages, { role: "assistant", content: reply }],
      displaySteps: [{ type: "auto", text: reply }],
      fixesStarted: state.fixesStarted + 1,
      screen: "session",
      loading: false,
    });
  } catch (e) {
    setState({ error: "Couldn't reach the guide. Check your connection and try again.", loading: false });
  }
}

async function sendReply() {
  if (!state.replyText.trim()) return;
  const userReply = state.replyText.trim();
  setState({ loading: true, error: null, replyText: "" });

  const newMessages = [...state.messages, { role: "user", content: userReply }];

  try {
    const reply = await callBackend(newMessages);
    setState({
      messages: [...newMessages, { role: "assistant", content: reply }],
      displaySteps: [...state.displaySteps, { type: "reply", text: userReply }, { type: "auto", text: reply }],
      loading: false,
    });
  } catch (e) {
    setState({ error: "Couldn't reach the guide. Check your connection and try again.", loading: false });
  }
}

function resetToStart() {
  setState({
    screen: state.fixesStarted >= FREE_FIX_LIMIT ? "paywall" : "start",
    problemText: "", imageBase64: null, imagePreview: null,
    messages: [], displaySteps: [], replyText: "", error: null,
  });
}

function render() {
  const app = document.getElementById("app");
  const stepCount = state.displaySteps.filter(s => s.type === "auto").length;

  let html = `
    <div class="header">
      <div class="brand"><span class="dot">◆</span> Holohacks</div>
      <div class="counter">${Math.min(state.fixesStarted, FREE_FIX_LIMIT)}/${FREE_FIX_LIMIT} free fixes used</div>
    </div>
  `;

  if (state.screen === "start") {
    html += `
      <h1>What's broken?</h1>
      <p class="sub">Describe it, or attach a photo. You'll get one clear step at a time, not a wall of instructions.</p>
      ${state.imagePreview ? `
        <div class="imgpreview">
          <img src="${state.imagePreview}" />
          <button class="remove" onclick="setState({imageBase64:null, imagePreview:null})">✕</button>
        </div>` : ""}
      <textarea id="problemInput" placeholder="e.g. Dishwasher won't drain, water pools at the bottom after every cycle">${state.problemText}</textarea>
      <div class="row">
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
        <button onclick="document.getElementById('fileInput').click()">📷 Attach photo</button>
        <button class="primary" id="startBtn" ${state.loading ? "disabled" : ""}>${state.loading ? "Thinking..." : "Start fix →"}</button>
      </div>
      ${state.error ? `<div class="error">${state.error}</div>` : ""}
    `;
  } else if (state.screen === "session") {
    let n = 0;
    html += `<div>`;
    state.displaySteps.forEach(s => {
      if (s.type === "reply") {
        html += `<div class="replybubble">${escapeHtml(s.text)}</div>`;
      } else {
        n++;
        html += `
          <div class="step">
            <div class="tag">Step ${String(n).padStart(2, "0")}</div>
            <p>${escapeHtml(s.text)}</p>
          </div>`;
      }
    });
    if (state.loading) html += `<div class="thinking">Thinking through the next step...</div>`;
    html += `</div>
      <div class="replyrow">
        <input id="replyInput" placeholder="What happened when you tried that?" value="${escapeAttr(state.replyText)}" />
        <button onclick="sendReply()">✓ Send</button>
      </div>
      <button class="linklike" onclick="resetToStart()">Start a different fix</button>
    `;
  } else if (state.screen === "paywall") {
    html += `
      <div class="paywall">
        <div class="lock">🔒</div>
        <h2>You've used your 3 free fixes</h2>
        <p>Keep going with unlimited step-by-step guidance for $6.99/month.</p>
        <button class="unlockbtn">Unlock unlimited fixes</button>
      </div>
    `;
  }

  app.innerHTML = html;

  // wire up events after render
  const problemInput = document.getElementById("problemInput");
  if (problemInput) problemInput.addEventListener("input", e => { state.problemText = e.target.value; });
  const fileInput = document.getElementById("fileInput");
  if (fileInput) fileInput.addEventListener("change", handleImagePick);
  const startBtn = document.getElementById("startBtn");
  if (startBtn) startBtn.addEventListener("click", startFix);
  const replyInput = document.getElementById("replyInput");
  if (replyInput) {
    replyInput.addEventListener("input", e => { state.replyText = e.target.value; });
    replyInput.addEventListener("keydown", e => { if (e.key === "Enter") sendReply(); });
  }
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.innerText = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return (str || "").replace(/"/g, "&quot;");
}

render();

// register service worker for installability
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
